name: Publish skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@atlassianengine'
      - run: npm publish --workspace @atlassianengine/codex-orchestration
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
